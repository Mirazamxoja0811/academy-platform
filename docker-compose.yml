version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mentor_postgres
    environment:
      POSTGRES_DB: mentor_db
      POSTGRES_USER: mentor_user
      POSTGRES_PASSWORD: mentor_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  django_admin:
    build:
      context: .
      dockerfile: Academy/Dockerfile
    container_name: mentor_django
    command: gunicorn Academy.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./Academy:/app
      - ./frontend/out:/app/frontend_out
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - DB_ENGINE=postgresql
      - DB_NAME=mentor_db
      - DB_USER=mentor_user
      - DB_PASSWORD=mentor_password
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=your_secret_key_here
      - DEBUG=1
      - FRONTEND_DIR=/app/frontend_out
      - ALLOWED_HOSTS=127.0.0.1,localhost,16.171.67.128
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: always

  fastapi_app:
    build:
      context: ./fastapi_app
      dockerfile: Dockerfile
    container_name: mentor_fastapi
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./fastapi_app:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://mentor_user:mentor_password@db:5432/mentor_db
      - BOT_TOKEN=8970648186:AAEBrOtMd0sHdHpxdqIJe5MNwwEZcNRxvr0
    ports:
      - "8001:8001"
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mentor_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - fastapi_app
    restart: always

  nginx:
    image: nginx:alpine
    container_name: mentor_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - django_admin
      - fastapi_app
      - frontend
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume:
