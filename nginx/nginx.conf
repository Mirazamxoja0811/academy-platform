events {
    worker_connections 1024;
}

http {
    upstream django {
        server django_admin:8000;
    }

    upstream fastapi {
        server fastapi_app:8001;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Frontend: barcha oddiy URL lar Next.js ga boradi
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_addrs;
        }

        # Django Admin
        location /superadmin/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Django static fayllar
        location /static/ {
            alias /app/static/;
        }

        location /media/ {
            alias /app/media/;
        }

        # Django (API endpoints)
        location /api/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Webhooks
        location /webhook {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
